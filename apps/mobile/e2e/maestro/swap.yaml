# Recipe Swap (W07): open the swap sheet from the review screen, type a reason,
# and confirm — the existing replace route performs the AI swap server-side
# (A4 Variant 1 "reason → replace" flow; no alternatives list).
appId: com.mealplanner.app
env:
  MOCK_URL: "http://localhost:4010"
---
- runScript:
    file: subflows/setScenario.js
    env:
      SCENARIO: "draft-plan"
- launchApp:
    clearState: true
- runFlow: subflows/login.yaml

# --- Reach review and open the swap sheet for a lunch (obiad) meal ---
- tapOn:
    id: "plan-review-cta"
- extendedWaitUntil:
    visible:
      text: "Przejrzyj plan"
    timeout: 20000
- tapOn:
    id: "review-swap-lunch"
- extendedWaitUntil:
    visible:
      id: "swap-sheet"
    timeout: 15000
- assertVisible:
    id: "swap-reason"
- assertVisible:
    id: "swap-confirm"

# --- Type a reason and confirm → replace route runs, sheet closes ---
- tapOn:
    id: "swap-reason"
- inputText: "za ciężkie"
- hideKeyboard
- tapOn:
    id: "swap-confirm"
- extendedWaitUntil:
    visible:
      text: "Przejrzyj plan"
    timeout: 15000
- assertNotVisible:
    id: "swap-sheet"
