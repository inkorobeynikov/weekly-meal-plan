# Reusable: sign in with email/password from the login screen.
# Social sign-in is hidden unless EXPO_PUBLIC_ENABLE_SOCIAL=true, so auth always
# goes through email/password. Leaves the app wherever the root index routes to
# next (onboarding on a fresh install, or the plan tab).
appId: com.mealplanner.app
---
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 30000
- tapOn:
    id: "login-email"
- inputText: "e2e@example.com"
# Dismiss the keyboard before the next field — otherwise it can cover the
# password input and the text lands in the still-focused email field.
# Android-only: iOS has no standard keyboard-dismiss action (Maestro's
# `hideKeyboard` throws on the iOS Simulator), and these short forms don't get
# covered there.
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: "login-password"
- inputText: "haslo12345"
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: "login-submit"
