# Onboarding (W06): walk all three steps, toggle allergy chips, finish → plan.
appId: com.mealplanner.app
env:
  MOCK_URL: "http://localhost:4010"
---
- runScript:
    file: subflows/setScenario.js
    env:
      SCENARIO: "draft-plan"
- launchApp:
    clearState: true

# Sign in to reach onboarding (fresh install routes here after login).
# Steps are detected by testIDs / interactive elements, NOT the "Krok N z 3"
# progress dots — that label sits on a non-accessible container View, so Maestro
# can't match it as an element.
- runFlow: subflows/login-email.yaml
- extendedWaitUntil:
    visible:
      id: "onboarding-name"
    timeout: 30000

# --- Step 1: household name ---
- tapOn:
    id: "onboarding-name"
- inputText: "Rodzina Testowa"
- hideKeyboard
- tapOn:
    id: "onboarding-next"

# --- Step 2: family size (just advance) ---
- tapOn:
    id: "onboarding-next"

# --- Step 3: allergies (HARD CONSTRAINTS) — the chips only exist on this step ---
- extendedWaitUntil:
    visible:
      text: "Gluten"
    timeout: 15000
- tapOn:
    text: "Gluten"
- tapOn:
    text: "Laktoza"
- tapOn:
    id: "onboarding-finish"

# --- Finished → plan ---
- extendedWaitUntil:
    visible:
      text: "Plan tygodnia"
    timeout: 30000
